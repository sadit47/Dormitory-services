services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: room_app
    volumes:
      - ./:/var/www/html
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: room_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: room_mysql
    environment:
      MYSQL_DATABASE: dorm_db
      MYSQL_USER: dorm_user
      MYSQL_PASSWORD: dorm_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3308:3306"
    volumes:
      - dorm_mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: room_pma
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: dorm_user
      PMA_PASSWORD: dorm_pass
    depends_on:
      - mysql

  node:
    image: node:20-alpine
    container_name: room_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -c "npm install && npm run build && tail -f /dev/null"

volumes:
  dorm_mysql_data:
